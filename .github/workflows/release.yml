name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.2.3)"
        required: true
        type: string
      release_token:
        description: "PAT with repo permissions to create releases"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Verify tag exists
        run: |
          git fetch --tags --force
          if ! git rev-parse --verify --quiet "refs/tags/${{ inputs.tag }}"; then
            echo "Tag '${{ inputs.tag }}' does not exist" >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release artifacts
        run: make all

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ inputs.release_token }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "release_token input is required" >&2
            exit 1
          fi
          gh release create "${{ inputs.tag }}" bin/* --title "${{ inputs.tag }}" --notes "Release ${{ inputs.tag }}"
